<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdallah's Mind</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --chat-bg: #111827;
            --input-bg: #1f2937;
            --text-color: #f3f4f6;
            --accent-color: #76b900; 
            --accent-hover: #5d9200;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            border-bottom: 1px solid #2d3748;
        }

        header h1 span {
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: var(--input-bg);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: rgba(118, 185, 0, 0.1);
            border-left: 4px solid var(--accent-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .system-message {
            background-color: #7f1d1d;
            color: #fca5a5;
            align-self: center;
            font-size: 0.9rem;
        }

        .input-container {
            display: flex;
            gap: 10px;
            background-color: var(--chat-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #374151;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            resize: none;
            font-family: inherit;
            font-size: 1rem;
            padding: 10px;
            outline: none;
        }

        button {
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #4b5563;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1><span>Abdallah</span> AI Prompt for free</h1>
    </header>

    <main>
        <div id="chat-container">
            <div class="message ai-message">System online. Enter a prompt below to communicate with the Abdallah's computing cluster.</div>
        </div>

        <div class="input-container">
            <textarea id="userInput" rows="1" placeholder="Type a message to Abdllah... (Press Enter to Send)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
